<html>

<style>

#cart{

}

#cart h2{
text-align:center;
}

.cart-item{
border-bottom:1px solid #ddd;

}

.total{

}

width:100%;
}

</style>

</head>

<body>

<header>
<h1>Bendang Gadget Store</h1>
<p>Shop Your Favorite Gadgets</p>
</header>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>Smartphone</h3>
<p>₹25000</p>
<button onclick="addToCart('Smartphone',25000)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>Laptop</h3>
<p>₹55000</p>
<button onclick="addToCart('Laptop',55000)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1518444065439-e933c06ce9cd">
<h3>Headphones</h3>
<p>₹3500</p>
<button onclick="addToCart('Headphones',3500)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
<h3>Bluetooth Speaker</h3>
<p>₹2500</p>
<button onclick="addToCart('Speaker',2500)">Add to Cart</button>
</div>

</div>

<div id="cart">
<h2>🛒 Cart</h2>
<div id="cartItems"></div>
<p class="total">Total: ₹ <span id="total">0</span></p>
<button class="checkout">Checkout</button>
</div>

<script>

let cart=[];
let total=0;

function addToCart(name,price){

cart.push({name,price});
total+=price;

updateCart();

}

function removeItem(index){

total-=cart[index].price;
cart.splice(index,1);

updateCart();

}

function updateCart(){

let cartItems=document.getElementById("cartItems");
cartItems.innerHTML="";

cart.forEach((item,index)=>{

cartItems.innerHTML+=`
<div class="cart-item">
${item.name} - ₹${item.price}
<button onclick="removeItem(${index})">❌</button>
</div>
`;

});

document.getElementById("total").innerText=total;

}

</script>

</body>
</html
