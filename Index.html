<!DOCTYPE html>
<html>
<head>
<title>Bendang Mega Gadget Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

header{
background:#1e3a8a;
color:white;
text-align:center;
padding:25px;
}

.category{
margin:40px;
}

.category h2{
background:#2563eb;
color:white;
padding:10px;
border-radius:8px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.product{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
text-align:center;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.price{
color:green;
font-weight:bold;
}

button{
background:#f97316;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ea580c;
}

footer{
background:#1e293b;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>Bendang Mega Gadget Store</h1>
<p>All Everyday Gadgets in One Place</p>
</header>

<div id="store"></div>

<footer>
<p>© 2026 Bendang Mega Gadget Store</p>
</footer>

<script>

const categories = {

"Communication Gadgets":[
{name:"Smartphone",price:25000,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{name:"Tablet",price:15000,img:"https://images.unsplash.com/photo-1580910051074-3eb694886505"},
{name:"Smartwatch",price:5000,img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"},
{name:"Wireless Earbuds",price:3000,img:"https://images.unsplash.com/photo-1518444065439-e933c06ce9cd"},
{name:"Laptop",price:55000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"}
],

"Kitchen Appliances":[
{name:"Refrigerator",price:30000,img:"https://images.unsplash.com/photo-1586201375761-83865001e31c"},
{name:"Microwave Oven",price:8000,img:"https://images.unsplash.com/photo-1586201375741-5a8f23c3c0c4"},
{name:"Blender",price:2500,img:"https://images.unsplash.com/photo-1590080875515-8a3a8dc5735e"},
{name:"Coffee Maker",price:4000,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"},
{name:"Toaster",price:2000,img:"https://images.unsplash.com/photo-1585238342028-4c2c8c94c7a1"}
],

"Home Comfort Devices":[
{name:"Air Conditioner",price:35000,img:"https://images.unsplash.com/photo-1581578731548-c64695cc6952"},
{name:"Air Purifier",price:12000,img:"https://images.unsplash.com/photo-1581091870627-3f1c9c3dbf8c"},
{name:"Vacuum Cleaner",price:9000,img:"https://images.unsplash.com/photo-1581579185169-1f8b7a3e3aa2"},
{name:"Electric Iron",price:1500,img:"https://images.unsplash.com/photo-1606813902911-3f4b1c40d2f1"},
{name:"Hair Dryer",price:1800,img:"https://images.unsplash.com/photo-1596464716127-f2a82984de30"}
],

"Entertainment Gadgets":[
{name:"Smart TV",price:40000,img:"https://images.unsplash.com/photo-1593784991095-a205069470b6"},
{name:"Bluetooth Speaker",price:2500,img:"https://images.unsplash.com/photo-1585386959984-a41552231658"},
{name:"Gaming Console",price:45000,img:"https://images.unsplash.com/photo-1606813902911-3f4b1c40d2f1"},
{name:"Headphones",price:3500,img:"https://images.unsplash.com/photo-1518444065439-e933c06ce9cd"},
{name:"Projector",price:15000,img:"https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04"}
],

"Office Tools":[
{name:"Desktop Computer",price:45000,img:"https://images.unsplash.com/photo-1518770660439-4636190af475"},
{name:"Printer",price:7000,img:"https://images.unsplash.com/photo-1588702547923-7093a6c3ba33"},
{name:"Scanner",price:6000,img:"https://images.unsplash.com/photo-1593642532400-2682810df593"},
{name:"Calculator",price:800,img:"https://images.unsplash.com/photo-1587145820266-a5951ee6f620"},
{name:"Power Bank",price:1200,img:"https://images.unsplash.com/photo-1580894732444-8ecded7900cd"}
]

};

const store=document.getElementById("store");

for(let category in categories){

let section=document.createElement("div");
section.className="category";

let title=document.createElement("h2");
title.innerText=category;

let grid=document.createElement("div");
grid.className="products";

categories[category].forEach(p=>{

let card=document.createElement("div");
card.className="product";

card.innerHTML=`
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">₹ <input type="number" value="${p.price}" style="width:90px"></p>
<button>Add to Cart</button>
`;

grid.appendChild(card);

});

section.appendChild(title);
section.appendChild(grid);
store.appendChild(section);

}

</script>

</body>
</html>
